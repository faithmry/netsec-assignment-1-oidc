<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OIDC Client App{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            background: rgba(0, 0, 0, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav h1 {
            color: white;
            font-size: 1.5rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.2);
            transition: background 0.3s;
        }
        nav a:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .container {
            background: white;
            border-radius: 8px;
            padding: 3rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn.secondary {
            background: #ddd;
            color: #333;
            margin-left: 0.5rem;
        }
        .btn.secondary:hover {
            background: #ccc;
        }
        .token-info {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 1rem;
            margin: 1rem 0;
            text-align: left;
            border-radius: 4px;
            word-break: break-all;
            font-size: 0.85rem;
            color: #666;
        }
        .user-info {
            background: #f5f5f5;
            padding: 1.5rem;
            border-radius: 4px;
            margin: 1rem 0;
            text-align: left;
        }
        .user-info dt {
            font-weight: bold;
            color: #333;
            margin-top: 0.5rem;
        }
        .user-info dd {
            color: #666;
            margin-bottom: 0.5rem;
            margin-left: 1rem;
        }
        {% block styles %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <h1>🔐 OIDC Client App</h1>
        <div>
            <a href="/">Home</a>
            {% if session.user_info %}
                <a href="/profile">Profile</a>
                <a href="/logout" class="btn secondary" style="display: inline-block; padding: 0.5rem 1rem;">Logout</a>
            {% endif %}
        </div>
    </nav>
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
